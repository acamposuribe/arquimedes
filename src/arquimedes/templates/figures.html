{% extends "base.html" %}
{% block content %}
{% include "partials/breadcrumbs.html" %}
<section class="panel">
  <h1>{{ page_title }}</h1>
  {% if figures %}
  <div class="figure-grid">
    {% for item in figures %}
    <figure class="figure-card">
      <button class="figure-zoom"
        data-zoom-alt="{{ item.figure_id }}"
        data-zoom-caption="{{ item.caption_text }}"
        data-zoom-description="{{ item.description_text }}"
        data-zoom-group="figures"
        data-zoom-meta="{% if item.source_page %}p. {{ item.source_page }}{% endif %}{% if item.visual_type_text %}{% if item.source_page %} · {% endif %}{{ item.visual_type_text }}{% endif %}"
        data-zoom-src="{{ item.image_url }}"
        data-zoom-title="{{ item.figure_id }}"
        title="{{ item.figure_id }}"
        type="button">
        <img alt="{{ item.figure_id }}" loading="lazy" src="{{ item.image_url }}">
      </button>
    </figure>
    {% endfor %}
  </div>
  {% else %}
  <p class="meta-line">{{ empty_message }}</p>
  {% endif %}
</section>
{% endblock %}
