# Arquimedes vault shared configuration (example).
# `arq init` writes the same shape automatically when you scaffold a new vault.

library_root: "~/Library/Mobile Documents/com~apple~CloudDocs/Arquimedes"

# Enable only the domains this vault should ingest, index, and publish.
# Omit this section to enable all built-in domains.
domains:
  enabled:
    - research
    - practice
    - proyectos

# Optional: skip otherwise-supported file extensions during ingest.
# Values are case-insensitive and may be written with or without a leading dot.
ingest:
  ignore_extensions: []
  # Example:
  # ignore_extensions: [.docx]

serve:
  host: "0.0.0.0"
  port: 8420
