# Arquimedes maintainer profile (example).
# `arq init` writes this shape automatically and fills in tunnel/hostnames when
# you provide them during setup.

llm:
  agent_cmd:
    - "claude --print"
    - "codex exec"

extraction:
  chunk_size: 500
  generate_thumbnails: true
  ocr_fallback: true
  # builtin | auto | opendataloader
  # auto uses OpenDataLoader only for PDFs with an embedded text layer.
  pdf_backend: builtin
  figure_extraction:
    embedded: true
    rasterize: true
    rasterize_dpi: 200

enrichment:
  prompt_version: "enrich-v1.0"
  enrichment_schema_version: "1"
  chunk_batch_target: 25
  chunk_parallel_requests: 8
  figure_batch_size: 3
  figure_parallel_requests: 5
  max_retries: 3
  parallel: 8
  llm_routes:
    document:
      - provider: claude
        command: "claude"
        model: sonnet
        effort: medium
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
    metadata:
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        model: gpt-5-mini
        effort: medium
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
    chunk:
      - provider: copilot
        command: "copilot"
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
    figure:
      - provider: copilot
        command: "copilot"
        model: gpt-5-mini
        effort: medium
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
      - provider: codex
        command: "codex exec"
        model: gpt-5.4-mini
        effort: medium
    cluster:
      - provider: claude
        command: "claude"
        model: sonnet
        effort: medium
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
    lint:
      - provider: claude
        command: "claude"
        model: sonnet
        effort: low
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true

serve:
  host: 0.0.0.0
  port: 8420
  # Set to true to expose the UI publicly through Cloudflare Tunnel + Access.
  # `arq init` can fill this in when you know the hostname.
  # public_exposure: true
  # allowed_hosts:
  #   - "arquimedes.example.com"

# Optional remote MCP profile for ChatGPT / other remote MCP clients.
# Bind to loopback, then expose via Cloudflare Tunnel + Access (see
# docs/maintainer/MAINTAINER.md). The `allowed_hosts` / `allowed_origins`
# entries are REQUIRED when a reverse proxy forwards the public hostname,
# otherwise the MCP SDK's DNS-rebinding protection responds with
# `421 Invalid Host header`.
#
mcp:
  transport: "streamable-http"
  host: "127.0.0.1"
  port: 8000
  streamable_http_path: "/mcp"
  keep_alive: true
  # Fill these in with the public hostname you will give to ChatGPT/Claude.
  # allowed_hosts:
  #   - "mcp.example.com"
  # allowed_origins:
  #   - "https://mcp.example.com"
  #   - "https://chatgpt.com"
  cloudflare_tunnel:
    enabled: false
    tunnel_name: "arquimedes-example"
    binary_path: "/opt/homebrew/bin/cloudflared"

# Optional non-interactive git publication settings for launchd jobs.
# If the vault remote uses GitHub HTTPS, Arquimedes automatically switches the
# push URL to SSH on first publish. For a dedicated deploy key, point
# `ssh_key_path` at that private key.
#
# git:
#   ssh_key_path: "~/.ssh/arq_vault_personal"
#   # Optional explicit push target if you don't want the auto-converted
#   # GitHub SSH URL.
#   # push_remote_url: "git@github.com:you/arq-vault-personal.git"
#   # Optional full override for advanced SSH flags.
#   # ssh_command: "ssh -i ~/.ssh/arq_vault_personal -o IdentitiesOnly=yes -o BatchMode=yes"

watch:
  scan_interval_minutes: 30
  batch_commit: true
  enrich_retries: 1

lint_full:
  schedule_cron: "0 2 * * *"

clustering:
  parallel_collections: 4

lint:
  post_compile_quick: true
  parallel_collection_audits: 4
  full_schedule_min_hours: 168
  graph_schedule:
    min_interval_hours: 168
    min_cluster_delta: 3
    min_material_delta: 5
