# Arquimedes maintainer profile (example).
# `arq init` writes this shape automatically and fills in tunnel/hostnames when
# you provide them during setup.

llm:
  agent_cmd:
    - "claude --print"
    - "codex exec"

extraction:
  chunk_size: 500
  generate_thumbnails: true
  ocr_fallback: true
  figure_extraction:
    embedded: true
    rasterize: true
    rasterize_dpi: 200

enrichment:
  prompt_version: "enrich-v1.0"
  enrichment_schema_version: "1"
  chunk_batch_target: 25
  chunk_parallel_requests: 8
  figure_batch_size: 3
  figure_parallel_requests: 5
  max_retries: 3
  parallel: 8
  llm_routes:
    document:
      - provider: claude
        command: "claude"
        model: sonnet
        effort: medium
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
    metadata:
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        model: gpt-5-mini
        effort: medium
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: false
    chunk:
      - provider: copilot
        command: "copilot"
        agent: copilot-no-tools-json
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: false
    figure:
      - provider: copilot
        command: "copilot"
        agent: copilot-no-tools-json
        model: gpt-5-mini
        effort: medium
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: false
      - provider: codex
        command: "codex exec"
        model: gpt-5.4-mini
        effort: medium
    cluster:
      - provider: claude
        command: "claude"
        model: sonnet
        effort: medium
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        agent: copilot-no-tools-json
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true
    lint:
      - provider: claude
        command: "claude"
        model: sonnet
        effort: low
      - provider: codex
        command: "codex exec"
        model: gpt-5.4
        effort: high
      - provider: copilot
        command: "copilot"
        agent: copilot-no-tools-json
        model: gpt-4.1
        silent: true
        no_ask_user: true
        no_auto_update: true
        no_custom_instructions: true
        allow_all: true

serve:
  host: 0.0.0.0
  port: 8420
  # Set to true to expose the UI publicly through Cloudflare Tunnel + Access.
  # `arq init` can fill this in when you know the hostname.
  # public_exposure: true
  # allowed_hosts:
  #   - "arquimedes.example.com"

# Optional remote MCP profile for ChatGPT / other remote MCP clients.
# Bind to loopback, then expose via Cloudflare Tunnel + Access (see
# docs/maintainer/MAINTAINER.md). The `allowed_hosts` / `allowed_origins`
# entries are REQUIRED when a reverse proxy forwards the public hostname,
# otherwise the MCP SDK's DNS-rebinding protection responds with
# `421 Invalid Host header`.
#
mcp:
  transport: "streamable-http"
  host: "127.0.0.1"
  port: 8000
  streamable_http_path: "/mcp"
  keep_alive: true
  # Fill these in with the public hostname you will give to ChatGPT/Claude.
  # allowed_hosts:
  #   - "mcp.example.com"
  # allowed_origins:
  #   - "https://mcp.example.com"
  #   - "https://chatgpt.com"
  cloudflare_tunnel:
    enabled: false
    tunnel_name: "arquimedes-example"
    binary_path: "/opt/homebrew/bin/cloudflared"

watch:
  scan_interval_minutes: 30
  batch_commit: true
  enrich_retries: 1

lint_full:
  schedule_cron: "0 2 * * *"

clustering:
  parallel_collections: 4

lint:
  post_compile_quick: true
  parallel_collection_audits: 4
  full_schedule_min_hours: 168
  graph_schedule:
    min_interval_hours: 168
    min_cluster_delta: 3
    min_material_delta: 5
