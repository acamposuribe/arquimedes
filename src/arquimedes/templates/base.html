<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} · Arquimedes</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">Arquimedes</a>
    <form action="/search" class="nav-search" method="get">
      <input name="q" placeholder="Search materials, concepts, figures">
    </form>
  </header>
  <div class="site-shell">
    <aside class="site-rail">
      <section class="rail-section">
        <h2>Navigation</h2>
        <a href="/wiki">Main page</a>
        <a href="/search">Search</a>
      </section>
      {% if nav_collections %}
      <section class="rail-section">
        <h2>Collections</h2>
        {% for item in nav_collections %}
        <a href="{{ wiki_url('wiki/' ~ item.domain ~ '/' ~ item.collection ~ '/_index.md') }}">{{ item.collection }}</a>
        {% endfor %}
      </section>
      {% endif %}
    </aside>
    <main class="page">
      <div class="freshness-banner" id="freshness-banner">
        <span>Checking workspace freshness…</span>
        <button data-update-url="/update" type="button">Update</button>
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
